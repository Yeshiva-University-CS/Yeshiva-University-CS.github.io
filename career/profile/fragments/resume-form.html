<!-- Status banner — full width -->
<div id="resumeFileStatus" class="text-sm mb-4 hidden"></div>

<!-- Two-column layout: upload controls left, preview right -->
<div class="grid grid-cols-10 gap-8 items-start">

    <!-- LEFT: Upload controls -->
    <div class="col-span-4">
        <h2 class="text-lg font-semibold text-gray-800 mb-1">Resume Upload</h2>
        <p class="text-sm text-gray-500 mb-4">Upload your resume as a PDF. It will be saved to <br/><code>@yccs-tracker/resume.pdf</code>.</p>

        <!-- View Resume Link -->
        <div id="resumeViewLink" class="hidden mb-4">
            <a id="resumeViewAnchor" href="#" target="_blank"
               class="inline-flex items-center gap-1.5 text-sm text-blue-600 hover:underline font-medium">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                </svg>
                View Current Resume
            </a>
        </div>

        <!-- Drop Zone -->
        <div id="resumeDropZone"
             class="border-2 border-dashed border-gray-300 rounded-lg p-10 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-colors"
             onclick="document.getElementById('resumeFileInput').click()"
             ondragover="event.preventDefault(); this.classList.add('border-blue-400','bg-blue-50')"
             ondragleave="this.classList.remove('border-blue-400','bg-blue-50')"
             ondrop="window.profile.handleResumeDrop(event)">
            <svg class="mx-auto h-12 w-12 text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
            </svg>
            <p class="text-sm text-gray-600">Drag &amp; drop your PDF here, or <span class="text-blue-600 font-medium">browse</span></p>
            <p class="text-xs text-gray-400 mt-1">PDF files only</p>
            <input type="file" id="resumeFileInput" accept=".pdf,application/pdf" class="hidden"
                   onchange="window.profile.handleResumeFileSelect(event)">
        </div>

        <!-- Selected File Info -->
        <div id="resumeFileInfo" class="hidden mt-3 flex items-center gap-3 p-3 bg-gray-50 rounded-md border border-gray-200">
            <svg class="h-5 w-5 text-red-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
            <div class="min-w-0 flex-1">
                <p id="resumeFileName" class="text-sm font-medium text-gray-800 truncate"></p>
                <p id="resumeFileSize" class="text-xs text-gray-500"></p>
            </div>
            <button type="button" onclick="window.profile.clearResumeFile()"
                    class="text-gray-400 hover:text-gray-600">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <!-- Upload Button -->
        <div class="mt-4">
            <button type="button" id="resumeUploadSubmitBtn" onclick="window.profile.uploadResume()" disabled
                    class="px-6 py-2.5 bg-blue-600 text-white rounded-md text-sm font-semibold hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-blue-600">
                Upload Resume
            </button>
        </div>

        <!-- Result -->
        <div id="resumeUploadResult" class="hidden mt-4 p-4 rounded-md text-sm"></div>
    </div>

    <div class="col-span-1"></div> <!-- Spacer -->
    
    <!-- RIGHT: PDF Preview — top-aligned with "View Current Resume" link -->
    <div id="resumePreviewContainer" class="hidden col-span-4">
        <p class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-2">Preview</p>
        <canvas id="resumePreviewCanvas" class="rounded border border-gray-200 shadow-sm block w-full"></canvas>
    </div>

</div>
