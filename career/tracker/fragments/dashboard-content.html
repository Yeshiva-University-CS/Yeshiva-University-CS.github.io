<div class="relative">
    <!-- Loading Indicator - Absolutely positioned to not affect layout -->
    <div id="loadingIndicator" class="absolute inset-0 z-10 hidden">
        <div class="rounded-lg bg-white p-8 text-center shadow">
            <div class="spinner mx-auto"></div>
            <p class="mt-4 text-gray-600">Loading student profiles...</p>
            <p id="loadingProgress" class="mt-2 text-sm text-gray-500"></p>
        </div>
    </div>

    <div class="space-y-4">

    <!-- Statistics -->
    <div id="statsRow" class="hidden">
        <div class="flex flex-wrap gap-4">
            <!-- Total Students -->
            <div class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm">
                <div class="flex items-center gap-2">
                    <span class="text-lg font-medium italic text-gray-600">Totals</span>
                    <span id="statPlansFinal" class="text-lg font-bold text-green-600">0</span>
                    <span class="text-sm font-medium text-gray-900">of</span>
                    <span id="statTotal" class="text-lg font-bold text-gray-900">0</span>
                    <span id="statTotalPercent" class="stat-badge">0%</span>
                    <span id="notLookingContainer" class="hidden text-sm text-gray-600">
                        (<span id="statNotLookingText">0 not looking</span>)
                    </span>
                </div>
            </div>
            <!-- Full Time Jobs -->
            <div id="ftJobsTile" class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm">
                <div class="flex items-center gap-2 flex-wrap">
                    <span class="text-lg font-medium italic text-gray-600">FT Jobs:</span>
                    <span id="statHaveJob" class="text-lg font-bold text-green-600">0</span>
                    <span class="text-sm text-gray-500">jobs</span>
                    <span class="text-gray-400">|</span>
                    <span id="statFTJobsNoOffer" class="text-lg font-bold text-red-600">0</span>
                    <span class="text-sm text-gray-500">looking</span>
                    <span id="statFTJobsPercent" class="stat-badge">0%</span>
                </div>
            </div>
            <!-- Internships -->
            <div id="internshipsTile" class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm">
                <div class="flex items-center gap-2 flex-wrap">
                    <span class="text-lg font-medium italic text-gray-600">Internships:</span>
                    <span id="statNoJob" class="text-lg font-bold text-green-600">0</span>
                    <span class="text-sm text-gray-500">jobs</span>
                    <span class="text-gray-400">|</span>
                    <span id="statInternshipsNoOffer" class="text-lg font-bold text-red-600">0</span>
                    <span class="text-sm text-gray-500">looking</span>
                    <span id="statInternshipsPercent" class="stat-badge">0%</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Grid and Chart Container -->
    <div id="gridContainer" class="hidden">
        <div class="grid gap-6 lg:grid-cols-4">
            <!-- Main Grid (3/4 width) -->
            <div class="lg:col-span-3">
                <div class="rounded-lg border border-gray-200 bg-white shadow-sm">
                    <div class="border-b border-gray-200 px-6 py-2">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <h3 class="text-lg font-semibold text-gray-900">Student Profiles</h3>
                                <div id="activeFiltersDisplay" class="text-xs text-gray-600 italic"></div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="window.app.exportToCSV()"
                                        title="Export to CSV"
                                        class="inline-flex items-center justify-center rounded-lg bg-green-600 p-2 text-white transition-all hover:bg-green-700 hover:shadow-md focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2">
                                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                    </svg>
                                </button>
                                <button id="resumeBtn"
                                        onclick="window.app.downloadResumes()"
                                        title="Download Resumes"
                                        class="inline-flex items-center justify-center rounded-lg bg-blue-600 p-2 text-white transition-all hover:bg-blue-700 hover:shadow-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="p-4">
                        <div id="profileGrid" class="ag-theme-alpine" style="height: 600px; width: 100%;"></div>
                    </div>
                </div>
            </div>

            <!-- Chart (1/4 width) -->
            <div class="lg:col-span-1">
                <div class="rounded-lg border border-gray-200 bg-white p-6 shadow-sm">
                    <h3 class="mb-4 text-lg font-semibold text-gray-900">Job Status Overview</h3>
                    <div id="chartWrapper" class="flex items-center justify-center" style="min-height: 300px;">
                        <canvas id="jobTypeChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
</div>
